<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>Voto Alice — Hazte tu foto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a;
    --fg:#fafafa;
    --accent:#c4243a;
    --green:#0f7544;
    --green-light:#1aa15e;
    --teal:#0e3a52;
    --radius:14px;
    --display:'Anton','Archivo Black',-apple-system,sans-serif;
    --serif:'Playfair Display',Georgia,serif;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--sans);overflow:hidden;overscroll-behavior:none}
  body{display:flex;align-items:center;justify-content:center;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

  /* Pantallas */
  .screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center}
  .screen.active{display:flex}

  /* Welcome */
  #welcome{padding:40px 28px;text-align:center;gap:0;position:relative;overflow:hidden}
  #welcome::before{
    content:'';position:absolute;inset:-20%;
    background:
      radial-gradient(40% 30% at 20% 15%, rgba(15,117,68,.35), transparent 70%),
      radial-gradient(35% 30% at 85% 85%, rgba(26,161,94,.22), transparent 70%),
      radial-gradient(60% 50% at 50% 100%, rgba(0,0,0,.6), transparent 80%);
    z-index:0;pointer-events:none;
    animation:bgShift 14s ease-in-out infinite alternate;
  }
  @keyframes bgShift{
    0%{transform:translate(0,0) scale(1)}
    100%{transform:translate(2%,-2%) scale(1.05)}
  }
  #welcome > *{position:relative;z-index:1}

  #welcome .eyebrow{
    font-family:var(--sans);font-weight:600;text-transform:uppercase;
    letter-spacing:.32em;font-size:11px;
    color:var(--green-light);
    margin-bottom:14px;
    display:inline-flex;align-items:center;gap:10px;
  }
  #welcome .eyebrow::before,#welcome .eyebrow::after{
    content:'';width:24px;height:1px;background:var(--green-light);opacity:.6;
  }

  #welcome .brand{
    font-family:var(--display);
    font-weight:400;
    letter-spacing:.04em;
    font-size:clamp(64px,18vw,120px);
    line-height:.88;
    margin-bottom:14px;
    text-transform:uppercase;
    background:linear-gradient(180deg,#fff 0%,#fff 60%,rgba(255,255,255,.7) 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:0 0 60px rgba(255,255,255,.08);
  }
  #welcome .brand .red{
    background:linear-gradient(180deg,#22c97a 0%,#0f7544 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
    color:transparent;
  }
  #welcome .tagline{
    font-family:var(--serif);
    font-style:italic;font-weight:500;
    font-size:18px;
    opacity:.85;
    margin-bottom:30px;
    letter-spacing:.01em;
  }
  #welcome p{opacity:.75;margin-bottom:36px;font-size:17px;max-width:340px}
  #welcome .preview-logo{
    background:#fff;
    padding:14px 20px;
    border-radius:28px;
    margin-bottom:28px;
    box-shadow:0 10px 40px rgba(0,0,0,.35);
    display:inline-block;
  }
  #welcome .preview-logo img{display:block;width:130px;height:auto}

  .btn{
    appearance:none;border:0;cursor:pointer;
    background:var(--fg);color:#000;
    font-family:var(--sans);
    font-weight:700;font-size:17px;letter-spacing:.02em;
    padding:18px 30px;border-radius:999px;
    min-width:240px;
    display:inline-flex;align-items:center;justify-content:center;gap:10px;
    transition:transform .12s ease, opacity .2s ease, box-shadow .2s ease;
  }
  .btn:active{transform:scale(.97)}
  .btn .btn-arrow{font-size:20px;transition:transform .25s ease}
  .btn:hover .btn-arrow{transform:translateX(4px)}
  .btn.secondary{background:transparent;color:var(--fg);border:1px solid rgba(255,255,255,.25)}
  .btn.accent{
    background:linear-gradient(135deg,#1aa15e 0%,#0f7544 60%,#084023 100%);
    color:#fff;
    box-shadow:0 12px 30px rgba(15,117,68,.45), inset 0 1px 0 rgba(255,255,255,.2);
  }
  .btn.accent:hover{box-shadow:0 16px 40px rgba(15,117,68,.6), inset 0 1px 0 rgba(255,255,255,.25)}
  .btn.share-main{
    background:linear-gradient(135deg,#1f1f1f,#000);
    color:#fff;border:1px solid rgba(255,255,255,.18);
    box-shadow:0 8px 22px rgba(0,0,0,.4);
  }

  /* Camera */
  #camera{background:#000}
  .stage{
    position:relative;width:100%;height:100%;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .frame{
    position:relative;
    aspect-ratio:9/16;
    height:100%;
    max-height:100%;
    background:#111;
    overflow:hidden;
    box-shadow:0 0 0 1px rgba(255,255,255,.04) inset;
  }
  @media (orientation:landscape){
    .frame{height:100%;width:auto}
  }
  #video{width:100%;height:100%;object-fit:cover;display:block}
  #video.mirror{transform:scaleX(-1)}

  .overlay{position:absolute;inset:0;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:18px}
  .overlay .topbar{display:flex;align-items:flex-start;justify-content:space-between}
  .overlay .logo-pill{
    background:rgba(255,255,255,.94);
    backdrop-filter:blur(8px);
    border-radius:12px;
    padding:8px 12px;
    box-shadow:0 6px 20px rgba(0,0,0,.25);
  }
  .overlay .logo-pill img{display:block;height:42px;width:auto}

  .overlay .vote{
    align-self:center;
    text-align:center;
    background:linear-gradient(135deg, #0f7544, #084023);
    color:#fff;
    padding:14px 28px;
    border-radius:14px;
    font-weight:900;
    font-size:30px;
    letter-spacing:.08em;
    text-transform:uppercase;
    box-shadow:0 10px 30px rgba(15,117,68,.45), inset 0 1px 0 rgba(255,255,255,.2);
    margin-bottom:6px;
  }

  /* Camera controls */
  .controls{
    position:absolute;left:0;right:0;bottom:calc(28px + env(safe-area-inset-bottom));
    display:flex;align-items:center;justify-content:center;gap:34px;
    z-index:5;
  }
  .shutter{
    width:78px;height:78px;border-radius:50%;
    background:#fff;border:5px solid rgba(255,255,255,.35);
    box-shadow:0 0 0 3px #fff inset;
    cursor:pointer;
    transition:transform .1s ease;
  }
  .shutter:active{transform:scale(.92)}
  .icon-btn{
    width:52px;height:52px;border-radius:50%;
    background:rgba(0,0,0,.5);backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.2);
    color:#fff;display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:22px;
  }
  .icon-btn:active{transform:scale(.92)}

  .topnav{
    position:absolute;top:calc(14px + env(safe-area-inset-top));left:14px;right:14px;
    display:flex;justify-content:space-between;z-index:5;
  }

  /* Result */
  #result{background:#000}
  #result .frame img{width:100%;height:100%;object-fit:contain;background:#000}
  #result .actions{
    position:absolute;left:0;right:0;bottom:calc(24px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;align-items:center;gap:12px;padding:0 22px;
    z-index:5;
  }
  #result .actions .row{display:flex;gap:10px;width:100%;max-width:420px}
  #result .actions .row .btn{flex:1;min-width:0;padding:16px 14px;font-size:15px}


  /* Toast */
  .toast{
    position:fixed;left:50%;bottom:calc(120px + env(safe-area-inset-bottom));
    transform:translateX(-50%);
    background:rgba(0,0,0,.85);color:#fff;
    padding:10px 18px;border-radius:999px;font-size:14px;
    opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:20;
  }
  .toast.show{opacity:1}

  /* Loader */
  .loader{
    width:42px;height:42px;border-radius:50%;
    border:3px solid rgba(255,255,255,.2);
    border-top-color:#fff;
    animation:spin 1s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  .hint{font-size:13px;opacity:.6;margin-top:14px;text-align:center;max-width:300px;line-height:1.4}
  .error{color:#ff8a8a;margin:14px 22px;text-align:center;font-size:14px}
</style>
</head>

  const W = 1080, H = 1920;
  canvas.width = W; canvas.height = H;

  let stream = null;
  let facing = 'user';
  let lastBlob = null;

  function show(name){
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screens[name].classList.add('active');
  }
  function toast(msg, ms=1800){
    const t = $('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('show'), ms);
  }

  async function startCamera(){
    $('errMsg').hidden = true;

    // Pre-flight checks
    const isSecure = window.isSecureContext || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    if (!isSecure || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      const proto = location.protocol;
      let msg;
      if (proto === 'file:') {
        msg = 'La cámara no funciona al abrir el archivo directamente (file://). Hay que servirlo por HTTPS o localhost. Mira las instrucciones que te ha dado Claude.';
      } else if (!isSecure) {
        msg = 'Esta página debe abrirse por HTTPS para acceder a la cámara. Protocolo actual: ' + proto;
      } else {
        msg = 'Tu navegador no soporta acceso a cámara (mediaDevices.getUserMedia no disponible).';
      }
      const err = $('errMsg'); err.textContent = msg; err.hidden = false;
      return;
    }

    try {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({
        audio:false,
        video:{
          facingMode: facing,
          width:{ideal:1080},
          height:{ideal:1920}
        }
      });
      video.srcObject = stream;
      video.classList.toggle('mirror', facing === 'user');
      await video.play();
      show('camera');
    } catch (e) {
      const msg = e.name === 'NotAllowedError'
        ? 'No has dado permiso a la cámara. Habilítala en los ajustes del navegador y recarga.'
        : (e.name === 'NotFoundError'
          ? 'No se ha encontrado cámara en este dispositivo.'
          : (e.name === 'NotReadableError'
            ? 'La cámara está siendo usada por otra app. Ciérrala y vuelve a intentar.'
            : 'No se pudo abrir la cámara: ' + (e.message || e.name)));
      const err = $('errMsg'); err.textContent = msg; err.hidden = false;
      show('welcome');
    }
  }

  function drawOverlay(ctx){
    // Logo pill (top-left)
    const padding = 60;
    const pillH = 130;
    const logoH = 90;
    const logoW = logoH * (logoImg.naturalWidth / logoImg.naturalHeight);
    const pillW = logoW + 60;
    const pillX = padding;
    const pillY = padding;

    // pill background
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = 30;
    ctx.shadowOffsetY = 8;
    roundRect(ctx, pillX, pillY, pillW, pillH, 22);
    ctx.fill();
    ctx.restore();

    // logo
    ctx.drawImage(logoImg, pillX + 30, pillY + (pillH - logoH)/2, logoW, logoH);

    // Vote badge (centered, lower third)
    const badgeText = 'VOTO ALICE';
    ctx.save();
    ctx.font = '900 96px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
    const textW = ctx.measureText(badgeText).width;
    const padX = 70, padY = 38;
    const badgeW = textW + padX*2;
    const badgeH = 96 + padY*2;
    const badgeX = (W - badgeW) / 2;
    const badgeY = H - badgeH - 220;

    // gradient bg
    const grad = ctx.createLinearGradient(badgeX, badgeY, badgeX+badgeW, badgeY+badgeH);
    grad.addColorStop(0, '#0f7544');
    grad.addColorStop(1, '#084023');
    ctx.fillStyle = grad;
    ctx.shadowColor = 'rgba(15,117,68,0.5)';
    ctx.shadowBlur = 40;
    ctx.shadowOffsetY = 16;
    roundRect(ctx, badgeX, badgeY, badgeW, badgeH, 28);
    ctx.fill();
    ctx.shadowColor = 'transparent';

    // text
    ctx.fillStyle = '#fff';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'center';
    ctx.letterSpacing = '0.08em';
    ctx.fillText(badgeText, W/2, badgeY + badgeH/2 + 4);
    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }

  function capture(){
    if (!video.videoWidth) return;

    // Cover-fit the video into 1080x1920
    const vw = video.videoWidth, vh = video.videoHeight;
    const targetRatio = W/H;
    const videoRatio = vw/vh;
    let sx, sy, sw, sh;
    if (videoRatio > targetRatio) {
      sh = vh;
      sw = vh * targetRatio;
      sx = (vw - sw) / 2;
      sy = 0;
    } else {
      sw = vw;
      sh = vw / targetRatio;
      sx = 0;
      sy = (vh - sh) / 2;
    }

    ctx.save();
    if (facing === 'user'){
      ctx.translate(W, 0);
      ctx.scale(-1, 1);
    }
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, W, H);
    ctx.restore();

    drawOverlay(ctx);

    canvas.toBlob((blob) => {
      lastBlob = blob;
      const url = URL.createObjectURL(blob);
      $('resultImg').src = url;
      stopCamera();
      show('result');
    }, 'image/jpeg', 0.92);
  }

  function stopCamera(){
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  }

  function downloadImage(){
    if (!lastBlob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(lastBlob);
    a.download = 'voto-alice.jpg';
    document.body.appendChild(a);
    a.click();
    a.remove();
    toast('Descargada en tu galería');
  }

  async function shareImage(){
    if (!lastBlob) return;
    const file = new File([lastBlob], 'voto-alice.jpg', {type:'image/jpeg'});
    if (navigator.canShare && navigator.canShare({files:[file]})) {
      try {
        await navigator.share({ files:[file], text:'#VotoAlice' });
        return;
      } catch(e){
        if (e.name === 'AbortError') return;
      }
    }
    // Fallback (escritorio o navegadores sin Web Share): descargar
    downloadImage();
    toast('Tu navegador no soporta compartir directo. Foto descargada.', 4500);
  }

  // Events
  $('startBtn').addEventListener('click', startCamera);
  $('shutterBtn').addEventListener('click', capture);
  $('switchBtn').addEventListener('click', () => {
    facing = facing === 'user' ? 'environment' : 'user';
    startCamera();
  });
  $('closeBtn').addEventListener('click', () => { stopCamera(); show('welcome'); });
  $('retakeBtn').addEventListener('click', () => { lastBlob = null; startCamera(); });
  $('downloadBtn').addEventListener('click', downloadImage);
  $('shareBtn').addEventListener('click', shareImage);

  // iOS: hide on tab switch to free camera
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) stopCamera();
  });
})();
</script>
